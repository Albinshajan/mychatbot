<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronMind AI Gym Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white flex flex-col h-screen">

    <header class="p-6 border-b border-zinc-800 text-center">
        <h1 class="text-2xl font-bold text-orange-500">IRONMIND AI ⚡</h1>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 font-sans">
        <div class="bg-zinc-800 p-3 rounded-lg max-w-[80%]">
            <b>Bot:</b> Hello! Ready to crush your workout? Ask for a muscle group (e.g., "chest").
        </div>
    </main>

    <footer class="p-4 bg-zinc-900 border-t border-zinc-800">
        <div class="flex gap-2">
            <input id="input" type="text" placeholder="Type 'chest' or 'legs' and press Enter..." 
                   class="w-full p-3 bg-zinc-800 rounded-lg outline-none focus:ring-2 focus:ring-orange-500">
        </div>
    </footer>

    <script>
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    /** * IMPORTANT: Replace the placeholder below with your actual Render URL 
     * formatted as: https://your-project-name.onrender.com/chat 
     */
    const BACKEND_URL = "https://mychatbot1-gfs0.onrender.com/chat";

    input.addEventListener("keypress", async (e) => {
      if (e.key === "Enter") {
        const message = input.value;
        if(!message) return; // Prevent empty messages

        // Display user message in the chat UI 
        chat.innerHTML += `<p class="text-orange-400 text-right"><b>You:</b> ${message}</p>`;

        try {
            // Fetching from your live Render backend instead of localhost [cite: 95]
            const res = await fetch(BACKEND_URL, {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ message })
            });

            const data = await res.json();

            // Display bot response in the chat UI 
            chat.innerHTML += `<p class="bg-zinc-800 p-3 rounded-lg max-w-[80%]"><b>Bot:</b> ${data.reply}</p>`;
        } catch (error) {
            chat.innerHTML += `<p class="text-red-500 italic"><b>Error:</b> Could not connect to the coach. Check your Render URL.</p>`;
        }

        input.value = "";
        
        // Auto-scroll to the bottom of the chat
        chat.scrollTop = chat.scrollHeight;
      }
    });
    </script>
</body>
</html>
